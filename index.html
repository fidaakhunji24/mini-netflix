<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Netflix -Fida's Local Streaming Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .upload-section {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      margin-bottom: 40px;
    }

    .upload-section h2 {
      color: #667eea;
      margin-bottom: 20px;
      font-size: 1.5em;
    }

    .upload-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="file"] {
      flex: 1;
      min-width: 200px;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
    }

    button {
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
      animation: slideIn 0.3s ease;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .status.loading {
      background: #e2e3e5;
      color: #383d41;
      border: 1px solid #d6d8db;
      display: block;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .videos-section h2 {
      color: white;
      margin-bottom: 20px;
      font-size: 1.8em;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .video-card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .video-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    }

    .video-player {
      width: 100%;
      height: 200px;
      background: #000;
    }

    .video-player video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-info {
      padding: 15px;
    }

    .video-info p {
      color: #666;
      font-size: 0.9em;
      word-break: break-all;
      margin: 5px 0;
    }

    .video-info strong {
      color: #667eea;
    }

    .empty-state {
      text-align: center;
      color: white;
      padding: 60px 20px;
      opacity: 0.8;
    }

    .empty-state p {
      font-size: 1.2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎬 Mini Netflix</h1>
      <p>Local Video Streaming Platform</p>
    </header>

    <!-- Upload Section -->
    <div class="upload-section">
      <h2>📤 Upload Video</h2>
      <form class="upload-form" id="uploadForm">
        <input type="file" id="videoInput" accept="video/*" required>
        <button type="submit">Upload</button>
      </form>
      <div class="status" id="status"></div>
    </div>

    <!-- Videos Section -->
    <div class="videos-section">
      <h2>📺 Available Videos</h2>
      <div class="video-grid" id="videoGrid">
        <div class="empty-state">
          <p>Loading videos...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:5000';
    const uploadForm = document.getElementById('uploadForm');
    const videoInput = document.getElementById('videoInput');
    const statusDiv = document.getElementById('status');
    const videoGrid = document.getElementById('videoGrid');

    // Upload video
    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const file = videoInput.files[0];
      if (!file) return;

      // Show loading state
      showStatus('Uploading...', 'loading');
      
      const formData = new FormData();
      formData.append('video', file);

      try {
        const response = await fetch(`${API_BASE}/upload`, {
          method: 'POST',
          body: formData
        });

        if (!response.ok) throw new Error('Upload failed');

        const data = await response.json();
        showStatus(`✅ ${data.message}`, 'success');
        videoInput.value = '';
        
        // Refresh video list
        setTimeout(loadVideos, 1000);
      } catch (error) {
        showStatus(`❌ Error: ${error.message}`, 'error');
      }
    });

    // Load and display videos
    async function loadVideos() {
      try {
        const response = await fetch(`${API_BASE}/videos-list`);
        if (!response.ok) throw new Error('Failed to load videos');

        const data = await response.json();
        const videos = data.videos || [];

        if (videos.length === 0) {
          videoGrid.innerHTML = '<div class="empty-state"><p>No videos yet. Upload one to get started!</p></div>';
          return;
        }

        videoGrid.innerHTML = videos.map(filename => `
          <div class="video-card">
            <div class="video-player">
              <video controls>
                <source src="${API_BASE}/videos/${filename}" type="video/mp4">
                Your browser does not support the video tag.
              </video>
            </div>
            <div class="video-info">
              <p><strong>File:</strong> ${filename}</p>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error loading videos:', error);
        videoGrid.innerHTML = '<div class="empty-state"><p>Error loading videos</p></div>';
      }
    }

    // Show status message
    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
      
      if (type === 'success' || type === 'error') {
        setTimeout(() => {
          statusDiv.className = 'status';
        }, 3000);
      }
    }

    // Load videos on page load
    loadVideos();
  </script>
</body>
</html>
